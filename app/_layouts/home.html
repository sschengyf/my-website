<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  <head>
    {% include meta.html page_title=page.title %}
  </head>
  <body class="container home-page">
    <div class="home-layout">
      <aside class="self-intro">
        <h1 class="name">{{page.title}}</h1>
        <div class="about">
          <pre><code>&lt;me coder cook coffee-drinker /&gt;</code></pre>
          {% include social.html %}
          <div class="bio-desktop">{% include bio.html %}</div>
        </div>
      </aside>
      <main class="main-content">{{ content }}</main>
      <div class="bio-mobile">{% include bio.html %}</div>
    </div>
    {% include footer.html %}
  </body>
</html>
