---
caption: 'Paste rich text from Word, emails, or web pages and instantly copy it as plain text with all formatting stripped.'
exclude_site_styles: true
---
<!DOCTYPE html>
<html lang="en">
<head>
    {% include meta.html page_title="Extract Plain Text" %}
    <link rel="stylesheet" href="/tools/extract-plain-text/styles.css">
</head>
<body>
    <div class="container">
        <h1>Extract Plain Text</h1>
        <p>Paste your rich text below to strip all formatting.</p>
        <textarea id="plainTextArea" placeholder="Paste here..."></textarea>
        <div class="actions">
            <button id="copyBtn">Copy Plain Text</button>
            <button id="clearBtn">Clear</button>
        </div>
    </div>
    <script src="/tools/extract-plain-text/script.js"></script>
</body>
</html>
